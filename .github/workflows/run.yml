name: Update chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update_chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Run notebook
        run: uv run jupyter nbconvert --to notebook --execute --inplace notebooks/bitcoin.ipynb
        env:
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}

      - name: Generate interactive chart HTML
        run: |
          mkdir -p _site
          uv run python -c "
          import os
          from btc_cycles import Bitcoin
          btc = Bitcoin(source='cryptocompare', api_key=os.environ['CRYPTOCOMPARE_API_KEY'])
          fig = btc.plot(kind='interactive', from_date='2012-11-28')
          fig.write_html('_site/index.html', config={'scrollZoom': True, 'displayModeBar': True})
          "
        env:
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}

      - name: Check for chart changes
        id: changes
        run: |
          if git diff --quiet notebooks/bitcoin.png; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get current time
        if: steps.changes.outputs.changed == 'true'
        uses: josStorer/get-current-time@v2
        id: current-time

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        uses: giocaizzi/python-dev-actions/.github/actions/commit@main
        with:
          message: "Update chart:${{ steps.current-time.outputs.readableTime }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
