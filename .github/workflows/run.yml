name: Update chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  update_chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Run notebook
        run: uv run jupyter nbconvert --to notebook --execute --inplace notebooks/bitcoin.ipynb
        env:
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}

      - name: Get current time
        uses: josStorer/get-current-time@v2
        id: current-time

      - name: Commit and push changes
        uses: giocaizzi/python-dev-actions/.github/actions/commit@main
        with:
          message: "Update chart:${{ steps.current-time.outputs.readableTime }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
